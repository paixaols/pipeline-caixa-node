name: Node.js CI/CD

# Dispara em pushes e PRs, mas só quando algo do app Node muda.
on:
  push:
    branches: [main]
    paths:
      - "nodejs-app/**"
      - ".github/workflows/nodejs-ci.yml"
  pull_request:
    paths:
      - "nodejs-app/**"
      - ".github/workflows/nodejs-ci.yml"

# Permissões necessárias para publicar imagem no GitHub Container Registry (ghcr.io).
permissions:
  contents: read
  packages: write

jobs:
  # ---------- 1. LINT + TESTES (com matrix de versões) ----------
  test:
    name: Lint e testes (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    defaults:
      run:
        working-directory: nodejs-app/backend
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependências
        run: npm install

      - name: Rodar linter
        run: npm run lint

      - name: Rodar testes
        run: npm test

  # ---------- 2. BUILD + PUSH DA IMAGEM DOCKER ----------
  # Só roda depois dos testes passarem e apenas em push na main.
  docker:
    name: Build e push da imagem Docker
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_GITHUB }}

      # - name: Build e push do backend
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: nodejs-app/backend
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}/node-backend:latest

      - name: Build e push do frontend
        uses: docker/build-push-action@v6
        with:
          context: nodejs-app/frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/node-frontend:latest

  # ---------- 3. DEPLOY DO FRONTEND (GitHub Pages) ----------
  deploy:
    name: Deploy do frontend no GitHub Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato (pasta do frontend)
        uses: actions/upload-pages-artifact@v3
        with:
          path: nodejs-app/frontend

      - name: Publicar no Pages
        id: deployment
        uses: <a href="mailto:actions/deploy-pages@v4" rel="noreferrer noopener" title="mailto:actions/deploy-pages@v4" target="_blank">actions/deploy-pages@v4</a>