name: Job summary

# Dispara em pushes e PRs, mas só quando algo do app Node muda.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Registrar inicio
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
      - run: npm test
      - name: Registrar duracao
        if: always()
        run: echo "Duracao: $(($(date +%s) - $START_TIME))s"