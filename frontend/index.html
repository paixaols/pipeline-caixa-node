<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Pipeline — Node.js</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <h1>Frontend Node.js</h1>
      <p class="sub">Envie uma mensagem e o backend responde <strong>recebido</strong>.</p>

      <form id="form">
        <input id="mensagem" type="text" placeholder="Digite sua mensagem..." autocomplete="off" />
        <button type="submit">Enviar</button>
      </form>

      <div id="resposta" class="resposta" hidden></div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
